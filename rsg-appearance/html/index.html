<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSG Appearance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --red: #8B0000;
            --red-light: #A52A2A;
            --red-dark: #5C0000;
            --black: #0a0a0a;
            --black-light: #1a1a1a;
            --gray-dark: #2a2a2a;
            --gray: #5a5044;
            --gray-light: #7a6e5d;
            --white: #e0d7c6;
            --white-dim: #b8a88a;
        }

        body {
            font-family: 'Philosopher', 'Times New Roman', Times, serif;
            background: transparent;
            color: var(--white);
            overflow: hidden;
            user-select: none;
        }

        #app {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
        
        #app.visible { display: block; }

        /* ==========================================
           LEFT PANEL - MAIN MENU
           ========================================== */
        .left-panel {
            position: absolute;
            left: 0;
            top: 0;
            width: 320px;
            height: 100vh;
            background: linear-gradient(90deg, rgba(10,10,10,0.98) 0%, rgba(10,10,10,0.95) 80%, rgba(10,10,10,0) 100%);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .panel-title {
            padding: 40px 25px 20px;
            border-bottom: 1px solid var(--gray-dark);
        }

        .panel-title h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .panel-title .subtitle {
            font-size: 14px;
            color: var(--gray-light);
            letter-spacing: 2px;
        }

        /* Red Line separator */
        .red-line {
            height: 2px;
            background: linear-gradient(90deg, var(--red) 0%, var(--red-dark) 70%, transparent 100%);
            margin: 0;
        }

        /* Menu Content */
        .menu-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .menu-content::-webkit-scrollbar { width: 3px; }
        .menu-content::-webkit-scrollbar-track { background: var(--black); }
        .menu-content::-webkit-scrollbar-thumb { background: var(--gray-light); }

        /* Menu Section */
        .menu-section {
            padding: 10px 0;
        }

        .menu-section-title {
            font-size: 11px;
            color: var(--gray-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px 25px;
        }

        /* Menu Item */
        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .menu-item:hover {
            background: rgba(139, 0, 0, 0.15);
        }

        .menu-item.active {
            background: rgba(139, 0, 0, 0.25);
        }

        .menu-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--red);
        }

        .menu-icon {
            width: 24px;
            font-size: 16px;
            text-align: center;
            margin-right: 12px;
            color: var(--red);
        }

        .menu-label {
            flex: 1;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .menu-arrow {
            font-size: 12px;
            color: var(--gray-light);
            transition: transform 0.2s ease;
        }

        .menu-item.expanded .menu-arrow {
            transform: rotate(90deg);
        }

        /* Submenu */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: rgba(0,0,0,0.3);
        }

        .submenu.open {
            max-height: 500px;
        }

        .submenu .menu-item {
            padding-left: 50px;
            font-size: 14px;
        }

        /* Footer */
        .panel-footer {
            padding: 15px 25px;
            border-top: 1px solid var(--gray-dark);
        }

        .footer-btns {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 15px;
            font-family: inherit;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-confirm {
            background: var(--red);
            color: var(--white);
        }

        .btn-confirm:hover {
            background: var(--red-light);
        }

        /* Random Button */
        .btn-random {
            background: var(--gray-dark);
            color: var(--white);
            margin-bottom: 10px;
            width: 100%;
        }

        .btn-random:hover {
            background: var(--red-dark);
        }

        /* ==========================================
           RIGHT PANEL - SETTINGS
           ========================================== */
        .right-panel {
            position: absolute;
            right: 0;
            top: 0;
            width: 360px;
            height: 100vh;
            background: linear-gradient(270deg, rgba(10,10,10,0.98) 0%, rgba(10,10,10,0.95) 80%, rgba(10,10,10,0) 100%);
            display: none;
            flex-direction: column;
        }

        .right-panel.visible {
            display: flex;
        }

        .settings-header {
            padding: 40px 25px 20px;
            border-bottom: 1px solid var(--gray-dark);
        }

        .settings-header h2 {
            font-size: 22px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .settings-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .settings-content::-webkit-scrollbar { width: 3px; }
        .settings-content::-webkit-scrollbar-track { background: var(--black); }
        .settings-content::-webkit-scrollbar-thumb { background: var(--gray-light); }

        /* Slider Control */
        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .control-label .name {
            font-size: 14px;
            color: var(--white-dim);
        }

        .control-label .value {
            font-size: 14px;
            color: var(--red);
            font-weight: 600;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-btn {
            width: 30px;
            height: 30px;
            background: var(--gray-dark);
            border: none;
            color: var(--white);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-btn:hover {
            background: var(--red);
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: var(--gray-dark);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--red);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Gender Selection */
        .gender-selection {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .gender-card {
            flex: 1;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--gray-dark);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .gender-card:hover {
            border-color: var(--gray);
            background: rgba(139, 0, 0, 0.15);
        }

        .gender-card.selected {
            border-color: var(--red);
            background: rgba(139, 0, 0, 0.25);
        }

        .gender-card .symbol {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .gender-card .gender-label {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Input Group */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: var(--white-dim);
            margin-bottom: 8px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 15px;
            font-family: inherit;
            font-size: 14px;
            background: var(--gray-dark);
            border: 1px solid var(--gray);
            color: var(--white);
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: var(--red);
        }

        .input-group select {
            cursor: pointer;
        }

        /* Rotate Controls */
        .rotate-controls {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            z-index: 100;
        }

        .rotate-btn {
            width: 50px;
            height: 50px;
            background: var(--gray-dark);
            border: none;
            color: var(--white);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .rotate-btn:hover {
            background: var(--red);
        }

        /* Camera Controls */
        .camera-controls {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px 20px;
            z-index: 100;
        }

        .camera-btn {
            padding: 12px 20px;
            background: var(--gray-dark);
            border: none;
            color: var(--white);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 70px;
        }

        .camera-btn:hover, .camera-btn.active {
            background: var(--red);
        }

        /* Hint */
        .controls-hint {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: var(--gray-light);
            border-top: 1px solid var(--gray-dark);
        }

        /* Shop Price */
        .price-display {
            padding: 15px 25px;
            background: rgba(139, 0, 0, 0.2);
            border-top: 1px solid var(--gray-dark);
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-label {
            font-size: 14px;
            color: var(--white-dim);
        }

        .price-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--red);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Left Panel -->
        <div class="left-panel">
            <div class="panel-title">
                <h1 id="main-title">Character</h1>
                <div class="subtitle" id="main-subtitle">Creation</div>
            </div>
            <div class="red-line"></div>
            
            <div class="menu-content" id="menu-container">
                <!-- JS Generated Menu -->
            </div>
            
            <div class="panel-footer">
                <button class="btn btn-random" id="btn-random" style="display: none;">⚄ Random Appearance</button>
                <div class="footer-btns">
                    <button class="btn btn-confirm" id="btn-confirm" style="width:100%;">Done</button>
                </div>
            </div>
        </div>
        
        <!-- Right Panel -->
        <div class="right-panel" id="right-panel">
            <div class="settings-header">
                <h2 id="settings-title">Settings</h2>
            </div>
            <div class="red-line"></div>
            
            <div class="settings-content" id="settings-container">
                <!-- JS Generated Settings -->
            </div>
            
            <div class="controls-hint">
                A/D - Rotate | W/S - Camera Up/Down
            </div>
            
            <!-- Shop Price -->
            <div class="price-display" id="price-display" style="display: none;">
                <div class="price-row">
                    <span class="price-label">Total:</span>
                    <span class="price-value" id="total-price">$0</span>
                </div>
            </div>
        </div>

        <!-- Camera & Rotate Controls (centered on screen) -->
        <div class="camera-controls">
            <button class="camera-btn" onclick="App.moveCamera('up')">▲ Up</button>
            <button class="camera-btn" onclick="App.moveCamera('down')">▼ Down</button>
            <button class="camera-btn" onclick="App.moveCamera('in')">+ Zoom In</button>
            <button class="camera-btn" onclick="App.moveCamera('out')">- Zoom Out</button>
            <button class="camera-btn" onclick="App.moveCamera('reset')">⟲ Reset</button>
        </div>

        <div class="rotate-controls">
            <button class="rotate-btn" onclick="App.rotatePed('left')">◀</button>
            <button class="rotate-btn" onclick="App.rotatePed('right')">▶</button>
        </div>
    </div>

    <script>
        const App = {
            mode: 'creator', // 'creator' or 'shop'
            isMale: true,
            creatorCache: {},
            clothesCache: {},
            currentCategory: null,
            currentSubmenu: null,
            shopPrices: {},
            totalPrice: 0,

            // Nationalities for 1899-1910 America
            nationalities: [
                'American',
                'Irish', 
                'German',
                'Italian',
                'Mexican',
                'Chinese',
                'African American',
                'Native American',
                'Polish',
                'Swedish',
                'English',
                'Scottish',
                'French',
                'Dutch',
                'Russian'
            ],

            categories: {
                creator: {
                    gender: { 
                        label: 'Gender', 
                        icon: '⚥' 
                    },
                    appearance: {
                        label: 'Appearance',
                        icon: '☺',
                        submenu: {
                            head: { label: 'Head', controls: [
                                { id: 'head', label: 'Head Type', min: 1, max: 20, def: 1 },
                                { id: 'skin_tone', label: 'Skin Tone', min: 1, max: 6, def: 1 },
                            ]},
                            body: { label: 'Body', controls: [
                                { id: 'body_size', label: 'Body Build', min: 1, max: 5, def: 3 },
                                { id: 'body_waist', label: 'Waist', min: 1, max: 30, def: 11 },
                                { id: 'chest_size', label: 'Chest', min: 1, max: 11, def: 6 },
                                { id: 'height', label: 'Height', min: 90, max: 110, def: 100 },
                            ]},
                            face: { label: 'Face', controls: [
                                { id: 'head_width', label: 'Head Width', min: -100, max: 100, def: 0 },
                                { id: 'face_width', label: 'Face Width', min: -100, max: 100, def: 0 },
                                { id: 'jaw_width', label: 'Jaw Width', min: -100, max: 100, def: 0 },
                                { id: 'jaw_height', label: 'Jaw Height', min: -100, max: 100, def: 0 },
                                { id: 'chin_width', label: 'Chin Width', min: -100, max: 100, def: 0 },
                                { id: 'chin_height', label: 'Chin Height', min: -100, max: 100, def: 0 },
                                { id: 'chin_depth', label: 'Chin Depth', min: -100, max: 100, def: 0 },
                            ]},
                            eyes: { label: 'Eyes', controls: [
                                { id: 'eyes_color', label: 'Eye Color', min: 5, max: 18, def: 5 },
                                { id: 'eyes_depth', label: 'Depth', min: -100, max: 100, def: 0 },
                                { id: 'eyes_angle', label: 'Angle', min: -100, max: 100, def: 0 },
                                { id: 'eyes_distance', label: 'Distance', min: -100, max: 100, def: 0 },
                                { id: 'eyes_height', label: 'Height', min: -100, max: 100, def: 0 },
                                { id: 'eyelid_height', label: 'Eyelid Height', min: -100, max: 100, def: 0 },
                                { id: 'eyelid_width', label: 'Eyelid Width', min: -100, max: 100, def: 0 },
                            ]},
                            nose: { label: 'Nose', controls: [
                                { id: 'nose_width', label: 'Width', min: -100, max: 100, def: 0 },
                                { id: 'nose_size', label: 'Size', min: -100, max: 100, def: 0 },
                                { id: 'nose_height', label: 'Height', min: -100, max: 100, def: 0 },
                                { id: 'nose_angle', label: 'Angle', min: -100, max: 100, def: 0 },
                                { id: 'nose_curvature', label: 'Curvature', min: -100, max: 100, def: 0 },
                                { id: 'nostrils_distance', label: 'Nostrils', min: -100, max: 100, def: 0 },
                            ]},
                            mouth: { label: 'Mouth', controls: [
                                { id: 'mouth_width', label: 'Width', min: -100, max: 100, def: 0 },
                                { id: 'mouth_depth', label: 'Depth', min: -100, max: 100, def: 0 },
                                { id: 'mouth_x_pos', label: 'Pos X', min: -100, max: 100, def: 0 },
                                { id: 'mouth_y_pos', label: 'Pos Y', min: -100, max: 100, def: 0 },
                                { id: 'upper_lip_height', label: 'Upper Lip Height', min: -100, max: 100, def: 0 },
                                { id: 'upper_lip_width', label: 'Upper Lip Width', min: -100, max: 100, def: 0 },
                                { id: 'lower_lip_height', label: 'Lower Lip Height', min: -100, max: 100, def: 0 },
                                { id: 'lower_lip_width', label: 'Lower Lip Width', min: -100, max: 100, def: 0 },
                            ]},
                            ears: { label: 'Ears', controls: [
                                { id: 'ears_width', label: 'Width', min: -100, max: 100, def: 0 },
                                { id: 'ears_height', label: 'Height', min: -100, max: 100, def: 0 },
                                { id: 'ears_size', label: 'Size', min: -100, max: 100, def: 0 },
                                { id: 'ears_angle', label: 'Angle', min: -100, max: 100, def: 0 },
                            ]},
                            cheekbones: { label: 'Cheekbones', controls: [
                                { id: 'cheekbones_width', label: 'Width', min: -100, max: 100, def: 0 },
                                { id: 'cheekbones_height', label: 'Height', min: -100, max: 100, def: 0 },
                                { id: 'cheekbones_depth', label: 'Depth', min: -100, max: 100, def: 0 },
                            ]},
                            eyebrows: { label: 'Eyebrows', controls: [
                                { id: 'eyebrow_height', label: 'Height', min: -100, max: 100, def: 0 },
                                { id: 'eyebrow_width', label: 'Width', min: -100, max: 100, def: 0 },
                                { id: 'eyebrow_depth', label: 'Depth', min: -100, max: 100, def: 0 },
                            ]},
                        }
                    },
                    hair: {
                        label: 'Hair',
                        icon: '✂',
                        controls: [
                            { id: 'hair_model', label: 'Hairstyle', min: 0, max: 29, def: 0 },
                            { id: 'hair_color', label: 'Hair Color', min: 1, max: 15, def: 1 },
                            { id: 'beard_model', label: 'Beard', min: 0, max: 50, def: 0, maleOnly: true },
                            { id: 'beard_color', label: 'Beard Color', min: 1, max: 17, def: 1, maleOnly: true },
                        ]
                    },
                    clothes: {
                        label: 'Starter Clothes',
                        icon: '◈',
                        controls: [
                            { id: 'shirt_model', label: 'Shirt', min: 0, max: 5, def: 0 },
                            { id: 'pants_model', label: 'Pants', min: 0, max: 5, def: 0 },
                            { id: 'boots_model', label: 'Boots', min: 0, max: 5, def: 0 },
                        ]
                    },
                    makeup: {
                        label: 'Features',
                        icon: '✦',
                        controls: [
                            { id: 'eyebrows_t', label: 'Eyebrows', min: 1, max: 20, def: 1 },
                            { id: 'eyebrows_c1', label: 'Eyebrows Color', min: 0, max: 23, def: 0 },
                            { id: 'eyebrows_op', label: 'Eyebrows Opacity', min: 0, max: 100, def: 100 },
                            { id: 'scars_t', label: 'Scars', min: 0, max: 16, def: 0 },
                            { id: 'scars_op', label: 'Scars Opacity', min: 0, max: 100, def: 100 },
                            { id: 'spots_t', label: 'Spots', min: 0, max: 16, def: 0 },
                            { id: 'spots_op', label: 'Spots Opacity', min: 0, max: 100, def: 100 },
                            { id: 'moles_t', label: 'Moles', min: 0, max: 16, def: 0 },
                            { id: 'moles_op', label: 'Moles Opacity', min: 0, max: 100, def: 100 },
                            { id: 'ageing_t', label: 'Aging', min: 0, max: 16, def: 0 },
                            { id: 'ageing_op', label: 'Aging Opacity', min: 0, max: 100, def: 100 },
                            { id: 'freckles_t', label: 'Freckles', min: 0, max: 16, def: 0 },
                            { id: 'freckles_op', label: 'Freckles Opacity', min: 0, max: 100, def: 100 },
                        ]
                    },
                    info: {
                        label: 'Info',
                        icon: '✎',
                        isInput: true,
                        fields: [
                            { id: 'firstname', label: 'First Name', placeholder: 'Enter first name...', type: 'text' },
                            { id: 'lastname', label: 'Last Name', placeholder: 'Enter last name...', type: 'text' },
                            { id: 'nationality', label: 'Nationality', type: 'select' },
                            { id: 'birthdate', label: 'Date of Birth', placeholder: '01.01.1870', type: 'date' },
                        ]
                    }
                },
                shop: {
                    shirts_full: { label: 'Shirts', icon: '◈', category: 'shirts_full' },
                    pants: { label: 'Pants', icon: '◈', category: 'pants' },
                    boots: { label: 'Boots', icon: '◈', category: 'boots' },
                    hats: { label: 'Hats', icon: '◈', category: 'hats' },
                    coats: { label: 'Coats', icon: '◈', category: 'coats' },
                    vests: { label: 'Vests', icon: '◈', category: 'vests' },
                    gloves: { label: 'Gloves', icon: '◈', category: 'gloves' },
                    neckwear: { label: 'Neckwear', icon: '◈', category: 'neckwear' },
                    eyewear: { label: 'Eyewear', icon: '◈', category: 'eyewear' },
                    masks: { label: 'Masks', icon: '◈', category: 'masks' },
                    gunbelts: { label: 'Gunbelts', icon: '◈', category: 'gunbelts' },
                    suspenders: { label: 'Suspenders', icon: '◈', category: 'suspenders' },
                    chaps: { label: 'Chaps', icon: '◈', category: 'chaps' },
                    spurs: { label: 'Spurs', icon: '◈', category: 'spurs' },
                }
            },

            init() {
                document.getElementById('btn-confirm').onclick = () => this.confirm();
                document.getElementById('btn-random').onclick = () => this.randomize();
                window.addEventListener('message', (e) => this.onMessage(e.data));
            },

            onMessage(data) {
                switch(data.action) {
                    case 'openCreator':
                        this.openCreator(data);
                        break;
                    case 'openShop':
                        this.openShop(data);
                        break;
                    case 'close':
                        this.close();
                        break;
                    case 'setCache':
                        this.creatorCache = data.cache || {};
                        break;
                    case 'updateMax':
                        this.updateSliderMax(data.id, data.max);
                        break;
                    case 'updatePrice':
                        this.updateTotalPrice(data.price);
                        break;
                }
            },

            openCreator(data) {
                this.mode = 'creator';
                this.visualOnly = data.visualOnly === true;
                this.isMale = data.isMale !== false;
                this.creatorCache = data.cache || {};
                if (this.visualOnly) {
                    document.getElementById('main-title').textContent = 'Appearance Editor';
                    document.getElementById('main-subtitle').textContent = 'Face & Body Only';
                    document.getElementById('btn-confirm').textContent = 'Save';
                } else {
                    document.getElementById('main-title').textContent = 'Character';
                    document.getElementById('main-subtitle').textContent = 'Creation';
                    document.getElementById('btn-confirm').textContent = 'Create';
                }
                document.getElementById('btn-random').style.display = this.visualOnly ? 'none' : 'block';
                document.getElementById('price-display').style.display = 'none';
                this.renderMenu();
                document.getElementById('app').classList.add('visible');
            },

            openShop(data) {
                this.mode = 'shop';
                this.isMale = data.isMale !== false;
                this.clothesCache = data.cache || {};
                this.shopPrices = data.prices || {};
                document.getElementById('main-title').textContent = 'Shop';
                document.getElementById('main-subtitle').textContent = 'Clothing';
                document.getElementById('btn-confirm').textContent = 'Buy';
                document.getElementById('btn-random').style.display = 'none';
                document.getElementById('price-display').style.display = 'block';
                this.totalPrice = 0;
                document.getElementById('total-price').textContent = '$0';
                this.renderMenu();
                document.getElementById('app').classList.add('visible');
            },

            close() {
                document.getElementById('app').classList.remove('visible');
                document.getElementById('right-panel').classList.remove('visible');
                this.currentCategory = null;
                this.currentSubmenu = null;
            },

            getCreatorCategories() {
                const full = this.categories.creator;
                if (!this.visualOnly) return full;
                const { appearance, hair, makeup } = full;
                return { appearance, hair, makeup };
            },

            renderMenu() {
                const container = document.getElementById('menu-container');
                const cats = this.mode === 'creator' ? this.getCreatorCategories() : this.categories.shop;
                
                container.innerHTML = '';
                
                for (const [key, cat] of Object.entries(cats)) {
                    const hasSubmenu = cat.submenu && Object.keys(cat.submenu).length > 0;
                    const isActive = this.currentCategory === key;
                    
                    const item = document.createElement('div');
                    item.className = 'menu-item' + (isActive ? ' active' : '') + (hasSubmenu && isActive ? ' expanded' : '');
                    item.innerHTML = `
                        <span class="menu-icon">${cat.icon || '◆'}</span>
                        <span class="menu-label">${cat.label}</span>
                        ${hasSubmenu ? '<span class="menu-arrow">▸</span>' : ''}
                    `;
                    item.onclick = () => this.selectCategory(key);
                    container.appendChild(item);
                    
                    if (hasSubmenu) {
                        const submenu = document.createElement('div');
                        submenu.className = 'submenu' + (isActive ? ' open' : '');
                        
                        for (const [subKey, subCat] of Object.entries(cat.submenu)) {
                            const subItem = document.createElement('div');
                            subItem.className = 'menu-item' + (this.currentSubmenu === subKey ? ' active' : '');
                            subItem.innerHTML = `<span class="menu-label">${subCat.label}</span>`;
                            subItem.onclick = (e) => {
                                e.stopPropagation();
                                this.selectSubmenu(key, subKey);
                            };
                            submenu.appendChild(subItem);
                        }
                        
                        container.appendChild(submenu);
                    }
                }
            },

            selectCategory(key) {
                const cats = this.mode === 'creator' ? this.getCreatorCategories() : this.categories.shop;
                const cat = cats[key];
                
                if (!cat) return;
                
                if (this.mode === 'shop') {
                    // In shop mode - show clothes settings
                    this.currentCategory = key;
                    this.renderMenu();
                    this.renderShopCategory(key, cat);
                    
                    fetch('https://rsg-appearance/selectShopCategory', {
                        method: 'POST',
                        body: JSON.stringify({ category: cat.category || key })
                    });
                } else if (cat.submenu) {
                    const wasOpen = this.currentCategory === key;
                    this.currentCategory = wasOpen ? null : key;
                    this.currentSubmenu = null;
                    this.renderMenu();
                    if (wasOpen) {
                        document.getElementById('right-panel').classList.remove('visible');
                    }
                } else if (key === 'gender') {
                    this.currentCategory = key;
                    this.renderMenu();
                    this.showGenderSelect();
                } else {
                    this.currentCategory = key;
                    this.currentSubmenu = null;
                    this.renderMenu();
                    this.renderSettings(cat);
                }
            },

            selectSubmenu(catKey, subKey) {
                const cats = this.mode === 'creator' ? this.getCreatorCategories() : this.categories.shop;
                const sub = cats[catKey]?.submenu?.[subKey];
                
                if (!sub) return;
                
                this.currentSubmenu = subKey;
                this.renderMenu();
                this.renderSettings(sub);
                
                fetch('https://rsg-appearance/selectCategory', {
                    method: 'POST',
                    body: JSON.stringify({ category: subKey })
                });
            },

            showGenderSelect() {
                document.getElementById('right-panel').classList.add('visible');
                document.getElementById('settings-title').textContent = 'Select Gender';
                
                document.getElementById('settings-container').innerHTML = `
                    <div class="gender-selection">
                        <div class="gender-card ${this.isMale ? 'selected' : ''}" onclick="App.selectGender(true)">
                            <div class="symbol">♂</div>
                            <div class="gender-label">Male</div>
                        </div>
                        <div class="gender-card ${!this.isMale ? 'selected' : ''}" onclick="App.selectGender(false)">
                            <div class="symbol">♀</div>
                            <div class="gender-label">Female</div>
                        </div>
                    </div>
                `;
            },

            selectGender(isMale) {
                this.isMale = isMale;
                this.showGenderSelect();
                
                // Update hairstyle max
                const hairMax = isMale ? 29 : 35;
                this.categories.creator.hair.controls[0].max = hairMax;
                
                fetch('https://rsg-appearance/selectGender', {
                    method: 'POST',
                    body: JSON.stringify({ isMale })
                });
            },

            renderSettings(cat) {
                document.getElementById('right-panel').classList.add('visible');
                document.getElementById('settings-title').textContent = cat.label;
                const container = document.getElementById('settings-container');
                container.innerHTML = '';

                if (cat.isInput) {
                    cat.fields.forEach(field => {
                        const div = document.createElement('div');
                        div.className = 'input-group';
                        
                        if (field.type === 'select' && field.id === 'nationality') {
                            const options = this.nationalities.map(n => 
                                `<option value="${n}">${n}</option>`
                            ).join('');
                            div.innerHTML = `
                                <label>${field.label}</label>
                                <select id="input-${field.id}">
                                    ${options}
                                </select>
                            `;
                        } else if (field.type === 'date') {
                            div.innerHTML = `
                                <label>${field.label}</label>
                                <input type="text" id="input-${field.id}" placeholder="${field.placeholder}" 
                                    maxlength="10" oninput="App.formatDate(this)">
                                <small style="color: var(--gray-light); font-size: 11px;">
                                    Birth Year: 1809-1881
                                </small>
                            `;
                        } else {
                            const isNameField = (field.id === 'firstname' || field.id === 'lastname');
                            div.innerHTML = `
                                <label>${field.label}</label>
                                <input type="text" id="input-${field.id}" placeholder="${field.placeholder || ''}"
                                    ${isNameField ? 'oninput="this.value = this.value.replace(/[^a-zA-Z\\s\\-]/g, \'\')"' : ''}>
                                ${isNameField ? '<small style="color: var(--gray-light); font-size: 11px;">Only letters allowed</small>' : ''}
                            `;
                        }
                        container.appendChild(div);
                    });
                } else if (cat.controls) {
                    cat.controls.forEach(ctrl => {
                        let minVal = ctrl.min;
                        let maxVal = ctrl.max;
                        let defVal = ctrl.def;
                        
                        // Filters for male
                        if (this.isMale) {
                            if (ctrl.id === 'head') {
                                minVal = 2;
                                if (defVal < 2) defVal = 2;
                            } else if (ctrl.id === 'eyes_color') {
                                minVal = 5;
                                if (defVal < 5) defVal = 5;
                            } else if (ctrl.id === 'hair_model') {
                                maxVal = 29;
                            }
                        }
                        
                        // Hide maleOnly for females
                        if (ctrl.maleOnly && !this.isMale) {
                            return;
                        }
                        
                        const value = this.creatorCache[ctrl.id] ?? defVal;
                        
                        const div = document.createElement('div');
                        div.className = 'control-group';
                        div.innerHTML = `
                            <div class="control-label">
                                <span class="name">${ctrl.label}</span>
                                <span class="value" id="val-${ctrl.id}">${value}</span>
                            </div>
                            <div class="slider-row">
                                <button class="slider-btn" onclick="App.adjust('${ctrl.id}', -1)">−</button>
                                <input type="range" id="slider-${ctrl.id}"
                                    min="${minVal}" max="${maxVal}" value="${value}"
                                    oninput="App.onChange('${ctrl.id}', this.value)">
                                <button class="slider-btn" onclick="App.adjust('${ctrl.id}', 1)">+</button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            },

            renderShopCategory(key, cat) {
                document.getElementById('right-panel').classList.add('visible');
                document.getElementById('settings-title').textContent = cat.label;
                const container = document.getElementById('settings-container');
                container.innerHTML = '';
                
                const category = cat.category || key;
                const currentData = this.clothesCache[category] || { model: 0, texture: 1 };
                
                // Model slider
                const modelDiv = document.createElement('div');
                modelDiv.className = 'control-group';
                modelDiv.innerHTML = `
                    <div class="control-label">
                        <span class="name">Model</span>
                        <span class="value" id="val-shop-model">${currentData.model}</span>
                    </div>
                    <div class="slider-row">
                        <button class="slider-btn" onclick="App.adjustShop('model', -1)">−</button>
                        <input type="range" id="slider-shop-model"
                            min="0" max="100" value="${currentData.model}"
                            oninput="App.onShopChange('model', this.value)">
                        <button class="slider-btn" onclick="App.adjustShop('model', 1)">+</button>
                    </div>
                `;
                container.appendChild(modelDiv);
                
                // Texture slider
                const textureDiv = document.createElement('div');
                textureDiv.className = 'control-group';
                textureDiv.innerHTML = `
                    <div class="control-label">
                        <span class="name">Texture</span>
                        <span class="value" id="val-shop-texture">${currentData.texture}</span>
                    </div>
                    <div class="slider-row">
                        <button class="slider-btn" onclick="App.adjustShop('texture', -1)">−</button>
                        <input type="range" id="slider-shop-texture"
                            min="1" max="20" value="${currentData.texture}"
                            oninput="App.onShopChange('texture', this.value)">
                        <button class="slider-btn" onclick="App.adjustShop('texture', 1)">+</button>
                    </div>
                `;
                container.appendChild(textureDiv);
                
                // Price
                const price = this.shopPrices[category] || 0;
                const priceDiv = document.createElement('div');
                priceDiv.className = 'control-group';
                priceDiv.style.marginTop = '20px';
                priceDiv.style.padding = '15px';
                priceDiv.style.background = 'rgba(139,0,0,0.2)';
                priceDiv.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <span>Price:</span>
                        <span style="color: var(--red); font-weight: bold;">$${price}</span>
                    </div>
                `;
                container.appendChild(priceDiv);
            },

            onChange(id, value) {
                value = parseInt(value);
                document.getElementById(`val-${id}`).textContent = value;
                this.creatorCache[id] = value;
                
                fetch('https://rsg-appearance/updateValue', {
                    method: 'POST',
                    body: JSON.stringify({ id, value })
                });
            },

            adjust(id, delta) {
                const slider = document.getElementById(`slider-${id}`);
                if (!slider) return;
                
                let value = parseInt(slider.value) + delta;
                value = Math.max(parseInt(slider.min), Math.min(parseInt(slider.max), value));
                
                // Skip broken hairstyles
                if (id === 'hair_model') {
                    if (this.isMale) {
                        // For men skip 19
                        while (value === 19 && value >= parseInt(slider.min) && value <= parseInt(slider.max)) {
                            value += delta > 0 ? 1 : -1;
                        }
                    } else {
                        // For women skip 21 and 32
                        const badHairs = [21, 32];
                        while (badHairs.includes(value) && value >= parseInt(slider.min) && value <= parseInt(slider.max)) {
                            value += delta > 0 ? 1 : -1;
                        }
                    }
                    value = Math.max(parseInt(slider.min), Math.min(parseInt(slider.max), value));
                }
                
                slider.value = value;
                this.onChange(id, value);
            },

            onShopChange(type, value) {
                value = parseInt(value);
                document.getElementById(`val-shop-${type}`).textContent = value;
                
                const category = this.currentCategory;
                if (!this.clothesCache[category]) {
                    this.clothesCache[category] = { model: 0, texture: 1 };
                }
                this.clothesCache[category][type] = value;
                
                fetch('https://rsg-appearance/updateShopClothes', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        category: this.categories.shop[category]?.category || category,
                        type, 
                        value 
                    })
                });
            },

            adjustShop(type, delta) {
                const slider = document.getElementById(`slider-shop-${type}`);
                if (!slider) return;
                
                let value = parseInt(slider.value) + delta;
                value = Math.max(parseInt(slider.min), Math.min(parseInt(slider.max), value));
                
                slider.value = value;
                this.onShopChange(type, value);
            },

            updateSliderMax(id, max) {
                const slider = document.getElementById(`slider-${id}`);
                if (slider) slider.max = max;
            },

            updateTotalPrice(price) {
                this.totalPrice = price;
                document.getElementById('total-price').textContent = '$' + price;
            },

            rotatePed(direction) {
                const endpoint = direction === 'left' ? 'rotatePedLeft' : 'rotatePedRight';
                fetch(`https://rsg-appearance/${endpoint}`, { method: 'POST', body: '{}' });
            },

            moveCamera(position) {
                fetch('https://rsg-appearance/moveCamera', { 
                    method: 'POST', 
                    body: JSON.stringify({ position }) 
                });
            },

            formatDate(input) {
                let value = input.value.replace(/\D/g, '');
                if (value.length > 2) {
                    value = value.slice(0, 2) + '.' + value.slice(2);
                }
                if (value.length > 5) {
                    value = value.slice(0, 5) + '.' + value.slice(5, 9);
                }
                input.value = value;
            },

            validateBirthYear(dateStr) {
                const parts = dateStr.split('.');
                if (parts.length !== 3) return false;
                const year = parseInt(parts[2]);
                return year >= 1809 && year <= 1881;
            },

            randomize() {
                fetch('https://rsg-appearance/randomize', { method: 'POST', body: '{}' });
            },

            goBack() {
                if (this.mode === 'shop') {
                    fetch('https://rsg-appearance/exitShop', { method: 'POST', body: '{}' });
                } else {
                    fetch('https://rsg-appearance/cancelCreator', { method: 'POST', body: '{}' });
                }
            },

            confirm() {
                if (this.mode === 'shop') {
                    fetch('https://rsg-appearance/purchaseClothes', { 
                        method: 'POST', 
                        body: JSON.stringify({ cache: this.clothesCache, total: this.totalPrice })
                    });
                } else if (this.visualOnly) {
                    // editappearance mode: only skin, no name/data
                    fetch('https://rsg-appearance/confirmCreator', {
                        method: 'POST',
                        body: JSON.stringify({
                            firstname: '',
                            lastname: '',
                            nationality: '',
                            birthdate: '',
                            cache: this.creatorCache
                        })
                    });
                } else {
                    const firstname = document.getElementById('input-firstname')?.value || '';
                    const lastname = document.getElementById('input-lastname')?.value || '';
                    const nationality = document.getElementById('input-nationality')?.value || '';
                    const birthdate = document.getElementById('input-birthdate')?.value || '';
                    
                    const alphaRegex = /^[a-zA-Z\s\-]+$/;
                    if (firstname.length < 2) {
                        this.showNotification('Enter first name (min. 2 chars)', 'error');
                        return;
                    }
                    if (!alphaRegex.test(firstname)) {
                        this.showNotification('First name must contain only letters', 'error');
                        return;
                    }
                    if (lastname.length < 2) {
                        this.showNotification('Enter last name (min. 2 chars)', 'error');
                        return;
                    }
                    if (!alphaRegex.test(lastname)) {
                        this.showNotification('Last name must contain only letters', 'error');
                        return;
                    }
                    if (!nationality) {
                        this.showNotification('Select nationality', 'error');
                        return;
                    }
                    if (!this.validateBirthYear(birthdate)) {
                        this.showNotification('Birth year must be between 1809 and 1881', 'error');
                        return;
                    }
                    
                    fetch('https://rsg-appearance/confirmCreator', {
                        method: 'POST',
                        body: JSON.stringify({
                            firstname,
                            lastname, 
                            nationality,
                            birthdate,
                            cache: this.creatorCache
                        })
                    });
                }
            },
            
            showNotification(message, type = 'info') {
                // Create notification
                const notif = document.createElement('div');
                notif.style.cssText = `
                    position: fixed;
                    top: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                    padding: 15px 30px;
                    background: ${type === 'error' ? 'rgba(139, 0, 0, 0.95)' : 'rgba(0, 100, 0, 0.95)'};
                    color: #f5f5dc;
                    border: 2px solid ${type === 'error' ? '#8B0000' : '#006400'};
                    border-radius: 0;
                    font-family: 'Philosopher', 'Times New Roman', Times, serif;
                    font-size: 18px;
                    z-index: 10000;
                    animation: fadeIn 0.3s ease;
                `;
                notif.textContent = message;
                document.body.appendChild(notif);
                
                setTimeout(() => {
                    notif.style.animation = 'fadeOut 0.3s ease';
                    setTimeout(() => notif.remove(), 300);
                }, 3000);
            }
        };

        App.init();
    </script>
</body>
</html>
